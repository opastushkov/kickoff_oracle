# NOTE: sidecar/ is deliberately NOT a workspace package — @qvac/sdk requires
# npm's flat install for its nested platform binaries (tetherto/qvac#1492).
# Install it with:  cd sidecar && npm install
packages:
  - '.'
supportedArchitectures:
  os:
    - linux
    - win32
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
# The QVAC SDK iterates fast (0.14.1 published 2026-07-02); trust Tether's scope.
minimumReleaseAgeExclude:
  - '@qvac/*'
allowBuilds:
  '@tailwindcss/oxide': true
  esbuild: true
overrides:
  vite: 6.3.5
